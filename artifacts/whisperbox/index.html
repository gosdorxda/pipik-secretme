    <!-- App loading screen -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loader-brand {
        font-family: "DM Sans", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.02em;
      }
      .loader-brand span {
        color: #0f9e80;
      }
      .loader-dots {
        display: flex;
        gap: 6px;
      }
      .loader-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #86ead4;
        animation: loader-bounce 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) {
        background: #c4b5fd;
        animation-delay: 0.2s;
      }
      .loader-dots span:nth-child(3) {
        background: #7dd3fc;
        animation-delay: 0.4s;
      }
      @keyframes loader-bounce {
        0%,
        80%,
        100% {
          transform: scale(0.7);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-brand">vooi<span>.lol</span></div>
      <div class="loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <div id="root"></div>

  </body>
