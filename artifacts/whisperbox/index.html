      rel="stylesheet"

    <!-- App loading screen -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          150deg,
          #f0fdf9 0%,
          #ffffff 50%,
          #f5f3ff 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      #app-loader.fade-out {
        opacity: 0;
        transform: scale(0.98);
        pointer-events: none;
      }
      .loader-logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader-logo-ring {
        position: absolute;
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #86ead4;
        border-right-color: #c4b5fd;
        animation: loader-spin 1s linear infinite;
      }
      .loader-logo-inner {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow:
          0 4px 16px rgba(134, 234, 212, 0.25),
          0 1px 4px rgba(0, 0, 0, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", sans-serif;
        font-size: 1.1rem;
        font-weight: 900;
        color: #0f2e28;
        letter-spacing: -0.03em;
        animation: loader-pulse 2s ease-in-out infinite;
      }
      .loader-brand {
        font-family: "DM Sans", sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.02em;
      }
      .loader-brand span {
        color: #0f9e80;
      }
      .loader-tagline {
        font-family: "DM Sans", sans-serif;
        font-size: 0.75rem;
        color: #94a3b8;
        letter-spacing: 0.01em;
      }
      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes loader-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.75;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-logo-wrap">
        <div class="loader-logo-ring"></div>
        <div class="loader-logo-inner">W</div>
      </div>
      <div>
        <div class="loader-brand">vooi<span>.lol</span></div>
      </div>
      <div class="loader-tagline">Memuat...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
